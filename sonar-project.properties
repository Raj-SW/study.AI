# SonarCloud configuration for the study.AI monorepo.
sonar.projectKey=Raj-SW_study.AI
sonar.organization=raj-sw

sonar.sources=apps/backend/src,apps/frontend/src,apps/ai-engine/src
sonar.tests=apps/ai-engine/tests,apps/backend/tests,apps/frontend/src/__tests__,apps/frontend/e2e
sonar.test.inclusions=**/__tests__/**,**/tests/**,**/*.test.*,**/*.spec.*

# One lcov per app x test-type, downloaded by the sonar CI job into coverage-reports/.
sonar.javascript.lcov.reportPaths=coverage-reports/coverage-ai-engine-unit/lcov.info,coverage-reports/coverage-ai-engine-integration/lcov.info,coverage-reports/coverage-backend-unit/lcov.info,coverage-reports/coverage-backend-integration/lcov.info,coverage-reports/coverage-frontend-unit/lcov.info,coverage-reports/coverage-frontend-integration/lcov.info

# Exclude vendored shadcn/ui primitives and build/dep output from analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,apps/frontend/src/components/ui/**
